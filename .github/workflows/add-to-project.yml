name: Add new issues to Team Apps project

on:
  issues:
    types:
      - opened

jobs:
  add-to-project:
    name: Add issue to Team Altinn Studio project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@828acb646a0a199a64596fa740761743d5f01b00 # main
        with:
          project-url: https://github.com/orgs/Altinn/projects/164
          github-token: ${{ secrets.ASSIGN_PROJECT_TOKEN }}
